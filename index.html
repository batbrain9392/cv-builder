<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#18181b" />
    <meta name="description" content="BioBot — AI-powered CV and cover letter builder" />

    <!-- Open Graph — WhatsApp, Telegram, LinkedIn, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://batbrain9392.github.io/cv-builder/" />
    <meta property="og:title" content="BioBot" />
    <meta property="og:description" content="AI-powered CV and cover letter builder — runs entirely in your browser. No sign-up, no server, no cookies." />
    <meta property="og:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BioBot" />
    <meta name="twitter:description" content="AI-powered CV and cover letter builder — runs entirely in your browser." />
    <meta name="twitter:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/cv-builder/favicon-32.png" />
    <link rel="manifest" href="/cv-builder/manifest.json" />
    <link rel="apple-touch-icon" href="/cv-builder/icon-192.png" />
    <title>BioBot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
