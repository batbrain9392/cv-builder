<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', dark ? '#3d3d3d' : '#ffffff');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://batbrain9392.github.io/cv-builder/" />
    <meta
      name="description"
      content="Free CV and resume builder with live preview and Word export. Optional AI tailoring to job descriptions (Gemini). Runs in your browser — no sign-up."
    />

    <!-- Open Graph — WhatsApp, Telegram, LinkedIn, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://batbrain9392.github.io/cv-builder/" />
    <meta property="og:title" content="BioBot — CV &amp; resume builder" />
    <meta
      property="og:description"
      content="Build your CV or resume in the browser, export to Word, optionally tailor with AI. No app server; optional Gemini; scrubbed error reporting in production."
    />
    <meta property="og:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BioBot — CV &amp; resume builder" />
    <meta
      name="twitter:description"
      content="Free CV and resume builder with live preview and Word export. Optional AI tailoring. Runs in your browser."
    />
    <meta name="twitter:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>BioBot — CV &amp; resume builder (free, in your browser)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
