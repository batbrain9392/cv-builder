<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', dark ? '#3d3d3d' : '#ffffff');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://batbrain9392.github.io/cv-builder/" />
    <meta
      name="description"
      content="ATS-friendly CV builder in your browser: live preview, structured Word (DOCX) export, optional AI tailoring to job descriptions with Gemini. No sign-up; draft stays on your device."
    />

    <!-- Open Graph — WhatsApp, Telegram, LinkedIn, Facebook, etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://batbrain9392.github.io/cv-builder/" />
    <meta
      property="og:title"
      content="BioBot — ATS-friendly CV builder (Word export, optional AI)"
    />
    <meta
      property="og:description"
      content="Build an ATS-oriented resume in the browser, export to Word, optionally tailor highlights to each job with Gemini. Client-side only; no CV upload to our servers."
    />
    <meta property="og:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BioBot — ATS-friendly CV builder (Word export, optional AI)"
    />
    <meta
      name="twitter:description"
      content="Live preview, ATS-oriented DOCX export, optional job-description tailoring with Gemini. Runs in your browser — no sign-up."
    />
    <meta name="twitter:image" content="https://batbrain9392.github.io/cv-builder/og-image.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>BioBot — CV &amp; resume builder (ATS-friendly Word, optional AI)</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
